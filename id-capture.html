<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#020814">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles/app.css">
  <title>Step 1 · ID Capture</title>
  <!-- Preload the model file while user scans ID (WASM comes from CDN, already cached) -->
  <link rel="preload" href="liveness/face_landmarker.task" as="fetch" crossorigin="anonymous">
</head>
<body>

  <div class="page id-page">
    <div class="shell">
      <header class="hero id-hero">
        <div class="capture-breadcrumb">
          <button class="back-btn" id="back-btn">← Change</button>
          <div class="doc-badge" id="doc-badge">
            <span id="badge-flag"></span>
            <span id="badge-label"></span>
          </div>
          <!-- step indicator (hidden for passport) -->
          <div class="capture-steps" id="capture-steps" hidden>
            <span class="step-dot active" id="step-front">Front</span>
            <span class="step-sep">→</span>
            <span class="step-dot" id="step-back">Back</span>
          </div>
        </div>
        <h1 id="capture-heading">Upload or scan your document</h1>
      </header>

      <section class="capture-block" id="camera-block">
        <div class="capture-frame" id="frame-id">
          <video id="vid-id" autoplay playsinline muted></video>
          <canvas id="overlay-id"></canvas>
          <div class="countdown" id="countdown-id">3</div>
          <div class="quality-toast" id="quality-toast">Warming up camera…</div>
        </div>

        <div class="challenge-panel compact-panel" id="quality-panel">
          <p id="quality-instr">Align the document inside the guide and avoid reflections.</p>
          <div class="status-pills">
            <div class="pill" id="pill-focus">Focus</div>
            <div class="pill" id="pill-light">Light</div>
            <div class="pill" id="pill-glare">Glare</div>
            <div class="pill" id="pill-align">Align</div>
          </div>
          <div class="progress-bar"><span id="quality-progress"></span></div>
          <div class="quality-checks" id="quality-checks"></div>
          <button class="primary take-btn" id="take-btn">Take Picture</button>

          <div class="upload-inline" id="upload-panel">
            <span class="upload-inline-label">or upload</span>
            <label class="upload-chip">
              <input type="file" id="upload-front" accept="image/*" hidden>
              Front
            </label>
            <label class="upload-chip" id="upload-back-label">
              <input type="file" id="upload-back" accept="image/*" hidden>
              Back
            </label>
            <span class="upload-hint" id="upload-hint"></span>
          </div>
        </div>
      </section>

      <section class="preview-row" id="preview-row" hidden>
        <div class="preview-images">
          <div class="preview-image-wrap">
            <p class="eyebrow">Front</p>
            <img id="id-preview" alt="Front of document">
          </div>
          <div class="preview-image-wrap" id="back-preview-wrap" hidden>
            <p class="eyebrow">Back</p>
            <img id="id-preview-back" alt="Back of document">
          </div>
        </div>
        <ul id="quality-list" class="quality-list-compact"></ul>
      </section>

      <div class="actions">
        <button class="primary" id="continue-btn" disabled>Continue to Liveness</button>
        <button class="ghost" id="retake-btn" disabled>Retake</button>
      </div>
    </div>
  </div>

  <div class="scrim hidden" id="error-layer">
    <div class="loader"></div>
    <p id="error-text">Unable to reach camera.</p>
  </div>

  <script src="scripts/countries.js"></script>
  <script type="module" src="scripts/id-capture.js"></script>
</body>
</html>
